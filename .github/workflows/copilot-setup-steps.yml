name: "Copilot Setup Steps"
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml
jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Run linter
              run: npm run lint
            - name: Run tests
              run: npm test
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"
            - name: Install Python dependencies
              run: pip install -r requirements.txt
            - name: Run Python linter
              run: flake8 .
            - name: Run Python tests
              run: pytest
            - name: Set up .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x"
            - name: Restore .NET dependencies
              run: dotnet restore
            - name: Build .NET
              run: dotnet build --configuration Release
            - name: Run .NET tests
              run: dotnet test --configuration Release

# KEEP WORKFLOWS SIMPLE
# 只包含基本語言/環境設定、依賴安裝、lint、測試
# 不包含複雜設定或自訂腳本

# Based on: https://github.com/github/awesome-copilot/blob/main/workflows/copilot-setup-steps.yml
