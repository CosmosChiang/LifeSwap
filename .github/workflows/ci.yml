name: CI

on:
    push:
        branches:
            - main
            - develop
    pull_request:

jobs:
    backend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore backend API
              run: dotnet restore backend/src/LifeSwap.Api/LifeSwap.Api.csproj

            - name: Build backend API
              run: dotnet build backend/src/LifeSwap.Api/LifeSwap.Api.csproj --configuration Release --no-restore

            - name: Test backend
              run: dotnet test backend/tests/LifeSwap.Api.Tests/LifeSwap.Api.Tests.csproj --configuration Release --no-build

    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              working-directory: frontend
              run: npm ci

            - name: Build frontend
              working-directory: frontend
              run: npm run build

            - name: Test frontend
              working-directory: frontend
              run: npm run test
